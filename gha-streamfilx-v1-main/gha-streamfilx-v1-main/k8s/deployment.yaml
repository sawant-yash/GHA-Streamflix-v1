apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamflix-v1
  labels:
    app: streamflix
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamflix
      version: v1
  template:
    metadata:
      labels:
        app: streamflix
        version: v1
    spec:
      containers:
      - name: streamflix-v1
        image: kastrov/streamflix:v1
        ports:
        - containerPort: 5000
