name: Deploy BLUE (v1)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build & Push Image
      run: |
        docker build \
        -t yash5030/streamflix:v1 \
        -f gha-streamfilx-v1-main/gha-streamfilx-v1-main/Dockerfile \
        gha-streamfilx-v1-main/gha-streamfilx-v1-main
        docker push yash5030/streamflix:v1

    - name: Deploy BLUE to EKS
      run: |
        kubectl apply -f gha-streamfilx-v1-main/gha-streamfilx-v1-main/k8s/deployment.yaml
        kubectl apply -f gha-streamfilx-v1-main/gha-streamfilx-v1-main/k8s/service-stable.yaml
